#
# Unattended GPG key generation template (Phase 1D).
#
# Consumed by `gpg --batch --gen-key < gen-key.conf` from generate-key.sh.
# See `man gpg` -> "Unattended key generation" for the full grammar.
#
# Override the passphrase by exporting GNUPGHOME and NETHRAOPS_REPO_KEY_PASSPHRASE
# in your shell BEFORE calling generate-key.sh. If neither is set the script
# generates a passphrase-less key (acceptable on CI where the private key
# is loaded from a GitHub Encrypted Secret one ephemeral run at a time;
# NOT acceptable for a key kept on a workstation).
#
# 4096-bit RSA is the conservative pick: it works with debsigs, rpm --addsign,
# and `gpg --detach-sign` on Release / repomd.xml. EdDSA / ECC keys are
# fine for repomd.xml but `rpm --addsign` historically tripped on them
# until rpm 4.16+; 4096 RSA is safe across every distro we ship to.
#
# ASCII only.
#
%echo Generating NethraOps repo signing key
Key-Type: RSA
Key-Length: 4096
Subkey-Type: RSA
Subkey-Length: 4096
Name-Real: NethraOps Repo Signing
Name-Email: repo-signing@nethraops.local
Name-Comment: NethraOps agent package + repo signing key
Expire-Date: 3y
%no-protection
%commit
%echo Key generated.
